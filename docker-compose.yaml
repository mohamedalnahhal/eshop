services:
  app:
    build: .
    container_name: php_app
    volumes:
      - ./src:/var/www/html
    ports:
      - "8000:80"
    depends_on:
      - mariadb
    extra_hosts:
      - "host.docker.internal:host-gateway"

  composer:
    image: composer:latest
    container_name: composer_app
    working_dir: /app
    volumes:
      - ./src:/app

  mariadb:
    image: mariadb:11
    container_name: mariadb_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: app_db
      MARIADB_USER: user
      MARIADB_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_ui
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  mariadb_data: