services:
  app:
    build: .
    volumes:
      - ./src:/var/www/html:cached
      - ./src/storage/logs:/var/www/html/storage/logs:delegated 
    ports:
      - "${APP_PORT}:80"
    depends_on:
      - mariadb
    extra_hosts:
      - "host.docker.internal:host-gateway"

  composer:
    image: composer:latest
    working_dir: /app
    volumes:
      - ./src:/app

  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  mariadb_data: